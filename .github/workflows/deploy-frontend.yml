name: Deploy Frontend to Azure Static Web Apps

on:
  push:
    branches: [main]
    paths:
      - 'marsville-ui/**'
      - '.github/workflows/deploy-frontend.yml'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: marsville-ui/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: marsville-ui

      - name: Build
        run: npm run build
        working-directory: marsville-ui
        env:
          # Full origin of the Azure App Service backend (no trailing slash).
          # Set this as a GitHub Actions variable (vars.VITE_API_BASE_URL) in the repo settings.
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: marsville-ui
          output_location: dist
          skip_app_build: true
